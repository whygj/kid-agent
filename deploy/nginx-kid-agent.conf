# Nginx configuration for Kid Agent
# Place this file in /etc/nginx/sites-available/kid-agent
# Enable with: ln -s /etc/nginx/sites-available/kid-agent /etc/nginx/sites-enabled/

upstream kid_agent_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;

    # Logging
    access_log /var/log/nginx/kid-agent-access.log;
    error_log /var/log/nginx/kid-agent-error.log;

    # Client body size limit (for file uploads if needed)
    client_max_body_size 10M;

    # WebSocket proxy configuration
    location /ws {
        proxy_pass http://kid_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout settings
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API endpoints
    location /api {
        proxy_pass http://kid_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WeChat webhook
    location /wechat {
        proxy_pass http://kid_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://kid_agent_backend;
        proxy_http_version 1.1;
        access_log off;
    }

    # Metrics endpoint (restrict access in production)
    location /metrics {
        proxy_pass http://kid_agent_backend;
        proxy_http_version 1.1;

        # Uncomment to restrict access to specific IPs
        # allow 127.0.0.1;
        # deny all;
    }

    # Static files (optional - cache them)
    location /static {
        proxy_pass http://kid_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache settings for static assets
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Root path
    location / {
        proxy_pass http://kid_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

