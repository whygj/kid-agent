<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学小助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部状态栏 -->
        <header class="status-bar">
            <div class="student-info">
                <span id="student-name" class="student-name">同学</span>
                <span class="level-badge">Lv.<span id="student-level">1</span></span>
                <span class="xp-badge">⭐ <span id="student-xp">0</span></span>
            </div>
            <div class="connection-status" id="connection-status">
                <span class="status-dot disconnected"></span>
                <span class="status-text">未连接</span>
            </div>
        </header>

        <!-- 聊天消息区域 -->
        <main class="chat-container" id="chat-container">
            <div class="welcome-message">
                <div class="welcome-icon">🎓</div>
                <h2>数学小助手</h2>
                <p>快乐学数学，天天有进步！</p>
            </div>
        </main>

        <!-- 底部输入区域 -->
        <footer class="input-area">
            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <span></span><span></span><span></span>
            </div>
            <div class="input-wrapper">
                <input
                    type="text"
                    id="message-input"
                    class="message-input"
                    placeholder="输入你的答案或问题..."
                    autocomplete="off"
                >
                <button id="send-button" class="send-button" disabled>
                    <span class="send-icon">➤</span>
                </button>
            </div>
        </footer>
    </div>

    <!-- 学生输入弹窗 -->
    <div class="modal-overlay" id="name-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-icon">👋</span>
                <h2>欢迎来到数学小助手</h2>
            </div>
            <p>请输入你的名字，开始学习吧！</p>
            <input
                type="text"
                id="student-name-input"
                class="modal-input"
                placeholder="你的名字"
                maxlength="10"
            >
            <button id="start-button" class="modal-button">开始学习</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
